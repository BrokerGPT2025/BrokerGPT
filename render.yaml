services:
  - type: web
    name: brokergpt
    env: node
    plan: starter
    buildCommand: |
      echo "╔════════════════════════════════════════════════════════════╗"
      echo "║          BROKERGPT DEPLOYMENT BUILD PROCESS                ║" 
      echo "║      Enhanced Multi-step Vite + ESM Build Process          ║"
      echo "╚════════════════════════════════════════════════════════════╝"
      
      # Set memory limits to avoid OOM crashes
      export NODE_OPTIONS="--max-old-space-size=384"
      
      # Set platform specifics to avoid Rollup native dependency issues
      export ROLLUP_SKIP_NODEJS_NATIVE=1
      export ESBUILD_BINARY_PATH="/tmp/esbuild-binary"
      
      # Install dependencies with production flag to save time and space
      NODE_ENV=production npm ci --production --no-optional --no-fund --ignore-scripts || npm install --production --no-optional --ignore-scripts
      
      # Make all build scripts executable
      find . -name "*.sh" -exec chmod +x {} \;
      
      # Create a guaranteed emergency server regardless of build success
      node fix-emergency-server.js || echo "Failed to create emergency server, but continuing"
      
      # Generate a simple static frontend without Vite/Rollup
      echo "Generating static frontend without Vite/Rollup..."
      node static-frontend.js || echo "Static frontend generation failed, continuing anyway"
      
      # Run our advanced Vite installer first if requested
      echo "Running Vite-free installer..."
      node install-vite.cjs || echo "Vite installer skipped, continuing without it"
      
      # Install core build tools locally - avoid global installs that cause permissions issues
      npm install vite@latest esbuild@latest tsx@latest @vitejs/plugin-react@latest react react-dom --no-optional
      
      # Set PATH to include node_modules/.bin to avoid npm bin -g errors
      export PATH="$PWD/node_modules/.bin:$PATH"
      echo "PATH now includes: $PATH"
      
      # Try to use a dedicated CommonJS-mode build package as a temporary build environment
      if [ -f "build-package.json" ]; then
        echo "Using temporary CommonJS build package.json..."
        cp build-package.json build-package.json.bak
        mv build-package.json package.json
        npm i
      fi
      
      # Check if Vite is properly installed
      node verify-vite.js
      
      # Use CommonJS build script first (most compatible) 
      echo "Running custom Vite build script (CommonJS)..."
      node custom-vite-build.cjs || true
      
      # Try our special Render build script
      echo "Running special render build script..."
      node render-build-special.cjs || true
      
      # Run our enhanced build script to handle all fallbacks
      echo "Running complete render build script..."
      bash render-build.sh
      
      # Restore original package.json if we used the temporary one
      if [ -f "build-package.json.bak" ]; then
        mv build-package.json.bak package.json
      fi
      
    # Comprehensive startup command with multiple fallbacks
    # This will be used by Render.com as the primary start command
    startCommand: >
      NODE_ENV=production 
      bash -c "
        # Set memory limits to prevent OOM crashes
        export NODE_OPTIONS='--max-old-space-size=384'
        
        # First try our universal production starter script
        if [ -f start-production.js ]; then
          echo 'Starting with universal production script...'
          node start-production.js || echo 'Universal starter failed, trying alternatives...'
        fi

        # If that fails, try the emergency server directly
        if [ $? -ne 0 ] && [ -f emergency-server.js ]; then
          echo 'Starting emergency server directly...'
          node emergency-server.js || echo 'Emergency server failed, trying fallbacks...'
        fi

        # If even that fails, try dist/index.js
        if [ $? -ne 0 ] && [ -f dist/index.js ]; then
          echo 'Starting from dist/index.js...'
          node dist/index.js || echo 'All server starts failed!'
        fi

        # Create a guaranteed minimal server as last resort
        if [ $? -ne 0 ]; then
          echo 'Creating and starting minimal HTTP server...'
          cat > minimal-server.js << 'EOL'
import http from 'http';
const server = http.createServer((req, res) => {
  res.writeHead(200, {'Content-Type': 'text/html'});
  res.end('<html><body><h1>BrokerGPT</h1><p>Minimal server is running. All other starts failed.</p></body></html>');
});
server.listen(process.env.PORT || 10000, '0.0.0.0');
console.log('Minimal HTTP server running on port ' + (process.env.PORT || 10000));
EOL
          node minimal-server.js
        fi
      "
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: BROWSERLESS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PORT
        value: 10000