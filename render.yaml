services:
  - type: web
    name: brokergpt
    env: node
    plan: starter
    buildCommand: |
      # Install dependencies with exact versions to avoid compatibility issues
      npm ci
      
      # Install build tools as local dependencies to ensure they're available in the PATH
      npm install vite esbuild tsx
      
      # Add node_modules/.bin to PATH to ensure build tools are accessible
      export PATH="$PATH:./node_modules/.bin"
      
      # Make build script executable
      chmod +x render-build.sh
      echo "Running custom build script"
      bash render-build.sh
      
    # Use our dedicated production script with enhanced ESM compatibility
    # This will be used by Render.com as the primary start command
    startCommand: NODE_ENV=production node --experimental-specifier-resolution=node start.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: BROWSERLESS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PORT
        value: 10000