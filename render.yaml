services:
  - type: web
    name: brokergpt
    env: node
    plan: starter
    buildCommand: |
      # Install dependencies
      npm install
      
      # Make build script executable
      chmod +x render-build.sh
      echo "Running custom build script"
      bash render-build.sh
      
    # Use our custom run script that directly executes TypeScript
    startCommand: NODE_ENV=production node run.js
    envVars:
      - key: NODE_ENV
        value: production