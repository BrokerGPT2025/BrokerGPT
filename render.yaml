services:
  - type: web
    name: brokergpt
    env: node
    plan: starter
    buildCommand: |
      # Install dependencies
      npm install
      
      # Make build script executable
      chmod +x render-build.sh
      echo "Running custom build script"
      bash render-build.sh
      
    # Use our dedicated production script
    # This will be used by Render.com as the primary start command
    startCommand: NODE_ENV=production node --import tsx start.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: BROWSERLESS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PORT
        value: 10000