services:
  - type: web
    name: brokergpt
    env: node
    plan: starter
    buildCommand: |
      # Install dependencies
      npm install
      
      # Make build script executable
      chmod +x render-build.sh
      echo "Running custom build script"
      bash render-build.sh
      
    # Use the standard npm start but point to the correct location
    startCommand: NODE_ENV=production npm start
    envVars:
      - key: NODE_ENV
        value: production